<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About — PyUI Demo</title>
  <meta name="description" content="Phase 1 demo — Button, Text, Heading, Grid" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    :root {
  --pyui-color-primary: #6C63FF;
  --pyui-color-primary-hover: #5A52E0;
  --pyui-color-secondary: #F3F4F6;
  --pyui-color-secondary-hover: #E5E7EB;
  --pyui-color-background: #FFFFFF;
  --pyui-color-surface: #F9FAFB;
  --pyui-color-text: #111827;
  --pyui-color-text-muted: #6B7280;
  --pyui-color-border: #E5E7EB;
  --pyui-color-success: #10B981;
  --pyui-color-warning: #F59E0B;
  --pyui-color-danger: #EF4444;
  --pyui-color-info: #3B82F6;
  --pyui-font-family: Inter, system-ui, sans-serif;
  --pyui-font-size-xs: 12px;
  --pyui-font-size-sm: 14px;
  --pyui-font-size-md: 16px;
  --pyui-font-size-lg: 18px;
  --pyui-font-size-xl: 24px;
  --pyui-font-size-2xl: 32px;
  --pyui-font-weight-normal: 400;
  --pyui-font-weight-medium: 500;
  --pyui-font-weight-bold: 700;
  --pyui-space-1: 4px;
  --pyui-space-2: 8px;
  --pyui-space-3: 12px;
  --pyui-space-4: 16px;
  --pyui-space-6: 24px;
  --pyui-space-8: 32px;
  --pyui-space-12: 48px;
  --pyui-space-16: 64px;
  --pyui-radius-sm: 4px;
  --pyui-radius-md: 8px;
  --pyui-radius-lg: 12px;
  --pyui-radius-xl: 16px;
  --pyui-radius-full: 9999px;
  --pyui-shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --pyui-shadow-md: 0 4px 6px rgba(0,0,0,0.07);
  --pyui-shadow-lg: 0 10px 15px rgba(0,0,0,0.10);
  --pyui-transition-fast: 100ms ease;
  --pyui-transition-normal: 200ms ease;
  --pyui-transition-slow: 300ms ease;
}
    
  </style>
  
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen antialiased"
      x-data='{"count": 0}'>

  <!-- PyUI App -->
  <div id="pyui-app" class="container mx-auto px-4 py-8 max-w-7xl">
    <h1 id="pyui-3b13df27" class="text-4xl font-bold tracking-tight text-gray-900">About PyUI</h1>
    <p id="pyui-c97c10bb" class="text-gray-800">PyUI is an open-source Python framework for building production-grade UIs.</p>
    <button id="pyui-ade3e06b" type="button" class="inline-flex items-center justify-center gap-2 rounded-lg font-medium transition-all duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2 select-none cursor-pointer px-4 py-2 text-sm border border-gray-300 text-gray-700 bg-transparent hover:bg-gray-50 focus:ring-gray-400">Back to Home</button>
  </div>

  <!-- PyUI Runtime -->
  <script>
    window.__pyuiState = {"count": 0};

    async function __pyuiEvent(handlerId, data) {
      try {
        const resp = await fetch('/pyui-api/event/' + handlerId, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ handler_id: handlerId, data: data || {} }),
        });
        const result = await resp.json();
        if (result.state) {
          Object.assign(window.__pyuiState, result.state);
          // Refresh reactive x-data proxy
          if (window.__pyuiAlpine) {
            Object.assign(window.__pyuiAlpine, result.state);
          }
        }
        if (result.reload) {
          window.location.reload();
        }
      } catch (e) {
        console.error('[PyUI] Event error:', e);
      }
    }
  </script>
</body>
</html>
